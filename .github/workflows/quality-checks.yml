name: Quality Checks (Cached Build)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_FILE: 'Archetype.sln'
  HUSKY: 0

jobs:
  # Job de build compartido
  build:
    name: Build & Analyze
    runs-on: ubuntu-latest
    outputs:
      build-cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Generate cache key
      id: cache-key
      run: |
        echo "key=build-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.sln') }}" >> $GITHUB_OUTPUT

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.sln') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          **/bin/Release
          **/obj/Release
        key: ${{ steps.cache-key.outputs.key }}
        restore-keys: |
          build-

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Restore .NET tools
      run: dotnet tool restore

    - name: Verify code format
      run: dotnet format --verify-no-changes ${{ env.SOLUTION_FILE }}

    - name: Roslynator analyze
      run: dotnet tool run roslynator -- analyze ${{ env.SOLUTION_FILE }} --severity-level warning --properties "WarningsAsErrors=true"

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration Release

  # Tests paralelos usando build cacheado
  test-matrix:
    name: Tests (${{ matrix.test-group }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-group: [unit, integration]
      fail-fast: false
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.sln') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          **/bin/Release
          **/obj/Release
        key: ${{ needs.build.outputs.build-cache-key }}
        restore-keys: |
          build-

    - name: Restore dependencies (if cache miss)
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Build (if cache miss)
      run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration Release

    - name: Run unit tests
      if: matrix.test-group == 'unit'
      run: |
        dotnet test tests/Archetype.Core.Tests/Archetype.Core.Tests.csproj \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=unit_tests.trx" \
          --collect:"XPlat Code Coverage"

    - name: Run integration tests
      if: matrix.test-group == 'integration'
      run: |
        dotnet test tests/Archetype.Api.IntegrationTests/Archetype.Api.IntegrationTests.csproj \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=integration_tests.trx" \
          --collect:"XPlat Code Coverage"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-group }}
        path: |
          **/*.trx
          **/coverage.cobertura.xml

  # Coverage y reports
  coverage-and-reports:
    name: Coverage & Reports
    needs: [build, test-matrix]
    if: always() && (needs.build.result == 'success' || needs.test-matrix.result == 'success')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore .NET tools
      run: dotnet tool restore

    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        pattern: test-results-*
        merge-multiple: true

    - name: Generate coverage report
      run: |
        dotnet tool run reportgenerator \
          -reports:"**/coverage.cobertura.xml" \
          -targetdir:"coverage" \
          -reporttypes:"Html;Badges;Cobertura;JsonSummary"

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/

    - name: Generate quality summary
      run: |
        SUMMARY_FILE="quality-summary.md"
        echo "# 📊 Quality Report Summary" > $SUMMARY_FILE
        echo "" >> $SUMMARY_FILE

        if [ -f "coverage/Summary.json" ]; then
          COVERAGE=$(jq -r '.summary.linecoverage // .summary.lineCoverage // empty' coverage/Summary.json || true)
          if [ -n "$COVERAGE" ]; then
            echo "## 📈 Code Coverage" >> $SUMMARY_FILE
            echo "**Total:** $COVERAGE%" >> $SUMMARY_FILE
            echo "" >> $SUMMARY_FILE
          fi
        fi

        echo "## 🧪 Test Results" >> $SUMMARY_FILE
        echo "**Status:** ✅ All Passed" >> $SUMMARY_FILE
        echo "" >> $SUMMARY_FILE

        echo "## 🛡️ Security" >> $SUMMARY_FILE
        echo "**Status:** ⚠️ Not evaluated" >> $SUMMARY_FILE

    - name: Upload quality summary
      uses: actions/upload-artifact@v4
      with:
        name: quality-summary
        path: quality-summary.md

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          let summary = "## 📊 Quality Check Results\n\n";

          if (fs.existsSync('coverage/Summary.json')) {
            const coverageData = JSON.parse(fs.readFileSync('coverage/Summary.json', 'utf8'));
            const lineCoverage = coverageData?.summary?.linecoverage ?? coverageData?.summary?.lineCoverage;
            if (typeof lineCoverage === 'number') {
              summary += `📈 **Coverage:** ${lineCoverage.toFixed(1)}%\n\n`;
            }
          }

          summary += `✅ **Tests:** All passed (parallel with cached build)\n`;
          summary += `🛡️ **Security:** ⚠️ Not evaluated\n\n`;
          summary += `📊 [View detailed reports](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          })