name: Quality Checks (Optimized)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_FILE: 'Archetype.sln'
  HUSKY: 0

jobs:
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    outputs:
      should-run-full: ${{ steps.changes.outputs.src-changed }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.sln') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Restore .NET tools
      run: dotnet tool restore

    - name: Verify code format
      run: dotnet format --verify-no-changes ${{ env.SOLUTION_FILE }}

    - name: Roslynator analyze
      run: dotnet tool run roslynator -- analyze ${{ env.SOLUTION_FILE }} --severity-level warning --properties "WarningsAsErrors=true"

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration Release

    - name: Check for source changes
      id: changes
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "src-changed=true" >> $GITHUB_OUTPUT
        else
          # Para push, siempre correr tests completos
          echo "src-changed=true" >> $GITHUB_OUTPUT
        fi

  test-matrix:
    name: Tests
    needs: quick-checks
    if: needs.quick-checks.outputs.should-run-full == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-group: [unit, integration]
      fail-fast: false
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.sln') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Restore .NET tools
      run: dotnet tool restore

    - name: Run unit tests
      if: matrix.test-group == 'unit'
      run: |
        dotnet test tests/Archetype.Core.Tests/Archetype.Core.Tests.csproj \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=unit_tests.trx" \
          --collect:"XPlat Code Coverage"

    - name: Run integration tests
      if: matrix.test-group == 'integration'
      run: |
        dotnet test tests/Archetype.Api.IntegrationTests/Archetype.Api.IntegrationTests.csproj \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=integration_tests.trx" \
          --collect:"XPlat Code Coverage"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-group }}
        path: |
          **/*.trx
          **/coverage.cobertura.xml

  coverage-and-reports:
    name: Coverage & Reports
    needs: [quick-checks, test-matrix]
    if: always() && (needs.quick-checks.result == 'success' || needs.test-matrix.result == 'success')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        pattern: test-results-*
        merge-multiple: true

    - name: Generate coverage report
      run: |
        dotnet tool run reportgenerator \
          -reports:"**/coverage.cobertura.xml" \
          -targetdir:"coverage" \
          -reporttypes:"Html;Badges;Cobertura;JsonSummary"

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/

    - name: Generate quality summary
      run: |
        SUMMARY_FILE="quality-summary.md"

        echo "# 📊 Quality Report Summary" > $SUMMARY_FILE
        echo "" >> $SUMMARY_FILE

        if [ -f "coverage/Summary.json" ]; then
          COVERAGE=$(jq -r '.summary.linecoverage // .summary.lineCoverage // empty' coverage/Summary.json || true)
          if [ -n "$COVERAGE" ]; then
            echo "## 📈 Code Coverage" >> $SUMMARY_FILE
            echo "**Total:** $COVERAGE%" >> $SUMMARY_FILE
            echo "" >> $SUMMARY_FILE
          fi
        fi

        echo "## 🧪 Test Results" >> $SUMMARY_FILE
        echo "**Status:** ✅ All Passed" >> $SUMMARY_FILE
        echo "" >> $SUMMARY_FILE

        echo "## 🛡️ Security" >> $SUMMARY_FILE
        echo "**Status:** ⚠️ Not evaluated" >> $SUMMARY_FILE

    - name: Upload quality summary
      uses: actions/upload-artifact@v4
      with:
        name: quality-summary
        path: quality-summary.md

  mutation-testing:
    name: Mutation Testing
    needs: quick-checks
    if: |
      needs.quick-checks.outputs.should-run-full == 'true' &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.sln') }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Run mutation testing
      run: |
        dotnet stryker \
          --test-project "tests/Archetype.Core.Tests/Archetype.Core.Tests.csproj" \
          --project "src/Archetype.Core/Archetype.Core.csproj" \
          --mutate "**/Domain/**/*.cs" \
          --reporter "html" \
          --reporter "json" \
          --break-at 0 \
          --threshold-low 40 \
          --threshold-high 60

    - name: Upload mutation report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: mutation-report
        path: |
          StrykerOutput/**/reports/
          StrykerOutput/**/*.html
